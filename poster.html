<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Алексей Александров — 70 лет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .poster {
            width: 100%;
            max-width: 700px;
            aspect-ratio: 3/4;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Canvas texture overlay */
        .poster::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.08;
            z-index: 100;
            pointer-events: none;
        }

        /* Abstract expressionist background - color blocks like his paintings */
        .paint-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .color-block {
            position: absolute;
            filter: blur(2px);
        }

        /* Deep blue dominant */
        .block-1 {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 50%, #1a4a6e 100%);
        }

        /* Orange/yellow warm tones */
        .block-2 {
            width: 60%;
            height: 45%;
            top: 5%;
            right: -5%;
            background: linear-gradient(180deg, #e67e22 0%, #f39c12 50%, #d35400 100%);
            transform: rotate(-5deg);
            border-radius: 10px;
        }

        /* Red accent */
        .block-3 {
            width: 50%;
            height: 35%;
            bottom: 25%;
            left: -10%;
            background: linear-gradient(45deg, #c0392b 0%, #e74c3c 50%, #922b21 100%);
            transform: rotate(8deg);
            border-radius: 8px;
        }

        /* Purple/magenta */
        .block-4 {
            width: 45%;
            height: 40%;
            bottom: -5%;
            right: 10%;
            background: linear-gradient(200deg, #8e44ad 0%, #9b59b6 50%, #6c3483 100%);
            transform: rotate(-3deg);
            border-radius: 12px;
        }

        /* Cyan accent */
        .block-5 {
            width: 35%;
            height: 30%;
            top: 35%;
            left: 20%;
            background: linear-gradient(160deg, #2980b9 0%, #3498db 50%, #1a5276 100%);
            transform: rotate(5deg);
            border-radius: 6px;
        }

        /* Yellow highlight */
        .block-6 {
            width: 25%;
            height: 20%;
            top: 15%;
            left: 10%;
            background: linear-gradient(90deg, #f1c40f 0%, #f4d03f 100%);
            transform: rotate(-8deg);
            border-radius: 4px;
        }

        /* Green touch */
        .block-7 {
            width: 30%;
            height: 25%;
            top: 60%;
            right: 5%;
            background: linear-gradient(140deg, #1e8449 0%, #27ae60 100%);
            transform: rotate(12deg);
            border-radius: 8px;
            opacity: 0.7;
        }

        .content {
            position: relative;
            z-index: 10;
            padding: 50px;
            display: flex;
            flex-direction: column;
            height: 100%;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .exhibition-label {
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #fff;
            background: rgba(0,0,0,0.4);
            padding: 12px 28px;
            backdrop-filter: blur(10px);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .number-container {
            position: relative;
            margin-bottom: 20px;
        }

        .number {
            font-size: 18rem;
            font-weight: 900;
            line-height: 0.8;
            color: #fff;
            text-shadow:
                4px 4px 0px rgba(0,0,0,0.3),
                8px 8px 20px rgba(0,0,0,0.4);
            letter-spacing: -0.05em;
        }

        .years-text {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .name {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            text-shadow: 3px 3px 15px rgba(0,0,0,0.5);
            color: #fff;
        }

        .activities {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-bottom: 20px;
        }

        .activity {
            font-size: 1.4rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
            padding: 8px 0;
            border-bottom: 3px solid rgba(255,255,255,0.6);
        }

        .footer {
            text-align: center;
            padding-top: 30px;
        }

        .venue-address {
            font-size: 1rem;
            line-height: 1.8;
            color: #fff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 16px 32px;
            display: inline-block;
            backdrop-filter: blur(5px);
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }
            .poster {
                max-width: none;
                height: 100vh;
            }
        }

        @media (max-width: 600px) {
            .content {
                padding: 30px;
            }
            .number {
                font-size: 10rem;
            }
            .name {
                font-size: 2rem;
            }
            .activities {
                flex-direction: column;
                gap: 16px;
            }
            .activity {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- Abstract expressionist paint layers -->
        <div class="paint-layer">
            <div class="color-block block-1"></div>
            <div class="color-block block-2"></div>
            <div class="color-block block-3"></div>
            <div class="color-block block-4"></div>
            <div class="color-block block-5"></div>
            <div class="color-block block-6"></div>
            <div class="color-block block-7"></div>
        </div>

        <div class="content">
            <div class="header">
                <span class="exhibition-label">Юбилейная выставка</span>
            </div>

            <div class="main-content">
                <div class="number-container">
                    <div class="number">70</div>
                </div>
                <div class="years-text">лет</div>
                <h1 class="name">Алексей Александров</h1>
                <div class="activities">
                    <span class="activity">Арт</span>
                    <span class="activity">Дизайн</span>
                </div>
            </div>

            <div class="footer">
                <p class="venue-address">
                    ул. Ильинка, 4 · Москва, 109012
                </p>
            </div>
        </div>
    </div>
</body>
</html>
